<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Meridian | Luxury Real Estate Digital Marketing Agency</title>
    <meta name="description" content="America's premier digital authority partner for luxury real estate agents. Local SEO, Google dominance, and lead generation for $1M+ markets.">
    <meta name="keywords" content="luxury real estate marketing, SEO for luxury agents, Google ranking luxury realtor, estate meridian">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Estate Meridian",
      "description": "Digital marketing agency for luxury real estate",
      "serviceType": "Digital Marketing",
      "areaServed": "United States",
      "url": "https://estatemeridian.com"
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0D1B2A;
            --gold: #C9A84C;
            --light: #FAF7F2;
            --dark: #2C2C2E;
            --white: #FFFFFF;
            --gold-light: #E8D5A3;
            --navy-light: #13243A;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            background: var(--white);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 70px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-cta {
            background: var(--gold);
            color: var(--primary);
            padding: 12px 24px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .nav-cta:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--gold);
            font-size: 24px;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(13, 27, 42, 0.82), rgba(13, 27, 42, 0.82)),
                        url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            margin-top: 70px;
        }

        .hero-content {
            max-width: 900px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pre-headline {
            color: var(--gold);
            font-size: 11px;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: 400;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .hero h1 {
            font-size: 72px;
            line-height: 1.15;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .hero-subtitle {
            color: rgba(250, 247, 242, 0.80);
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 48px;
            max-width: 580px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 48px;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .stat-item {
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            height: 60px;
            width: 1px;
            background: rgba(201, 168, 76, 0.3);
        }

        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--gold);
            font-weight: 300;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(250, 247, 242, 0.60);
            letter-spacing: 1px;
            font-weight: 400;
        }

        .hero-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 1s both;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--primary);
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.3);
        }

        .btn-secondary {
            color: rgba(250, 247, 242, 0.70);
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* Trust Bar */
        .trust-bar {
            background: var(--navy-light);
            border-top: 1px solid rgba(201, 168, 76, 0.2);
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
            padding: 20px 0;
        }

        .trust-bar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .trust-text {
            font-size: 12px;
            color: rgba(250, 247, 242, 0.50);
            font-weight: 300;
        }

        .trust-brands {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: rgba(250, 247, 242, 0.70);
            letter-spacing: 1px;
            font-weight: 400;
        }
