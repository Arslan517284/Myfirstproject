<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsplash Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        input:focus {
            outline: none;
            transform: scale(1.05);
        }

        button {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .image-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            background: #f0f0f0;
            aspect-ratio: 1;
        }

        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .image-card:hover .image-info {
            transform: translateY(0);
        }

        .photographer {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .photo-location {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .load-more {
            text-align: center;
            margin-top: 30px;
        }

        .load-more button {
            padding: 12px 40px;
            font-size: 1.1em;
        }

        .error {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            border-left: 4px solid #ff6b6b;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            input {
                width: 100%;
            }

            .search-section {
                flex-direction: column;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Unsplash Gallery</h1>
            <p>Discover beautiful, free photos from Unsplash</p>
        </header>

        <div class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Search for images (e.g., nature, cities, animals)..."
            >
            <button onclick="searchImages()">Search</button>
            <button onclick="getRandomImages()">Random</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading images...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="gallery" class="gallery"></div>

        <div id="loadMore" class="load-more" style="display: none;">
            <button onclick="loadMoreImages()">Load More</button>
        </div>
    </div>

    <script>
        const ACCESS_KEY = 'YOUR_UNSPLASH_ACCESS_KEY'; // Get from https://unsplash.com/oauth/applications
        const API_BASE = 'https://api.unsplash.com';

        let currentPage = 1;
        let currentQuery = 'nature';
        let isLoading = false;

        // Show/hide loading spinner
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            isLoading = show;
        }

        // Show/hide error message
        function showError(message, show) {
            const errorDiv = document.getElementById('error');
            if (show) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        // Clear gallery
        function clearGallery() {
            document.getElementById('gallery').innerHTML = '';
            currentPage = 1;
        }

        // Fetch images from Unsplash
        async function fetchImages(query, page = 1) {
            if (isLoading) return;

            showLoading(true);
            showError('', false);

            try {
                // Using Unsplash's public API without authentication (limited to 50 requests/hour)
                // For production, register at https://unsplash.com/oauth/applications and use ACCESS_KEY
                const url = query.startsWith('random')
                    ? `${API_BASE}/photos/random?count=12&orientation=squarish`
                    : `${API_BASE}/search/photos?query=${encodeURIComponent(query)}&page=${page}&per_page=12&orientation=squarish`;

                const response = await fetch(url);

                if (response.status === 403) {
                    showError('Rate limit reached. Please wait a moment and try again.', true);
                    showLoading(false);
                    return;
                }

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const images = query.startsWith('random') ? data : data.results;

                if (images.length === 0) {
                    showError('No images found. Try a different search term.', true);
                    showLoading(false);
                    return;
                }

                displayImages(images, page === 1);
                document.getElementById('loadMore').style.display = 'block';

            } catch (error) {
                showError(`Error loading images: ${error.message}`, true);
                console.error('Fetch error:', error);
            }

            showLoading(false);
        }

        // Display images in gallery
        function displayImages(images, clearPrevious = true) {
            const gallery = document.getElementById('gallery');

            if (clearPrevious) {
                gallery.innerHTML = '';
            }

            images.forEach(image => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img
                        src="${image.urls.regular}"
                        alt="${image.alt_description || 'Unsplash photo'}"
                        loading="lazy"
                    >
                    <div class="image-info">
                        <div class="photographer">📷 ${image.user.name}</div>
                        <div class="photo-location">
                            ${image.location?.title || 'Unknown location'}
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    window.open(image.links.html, '_blank');
                };

                gallery.appendChild(card);
            });
        }

        // Search images
        function searchImages() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                currentQuery = query;
                clearGallery();
                fetchImages(query, 1);
            }
        }

        // Get random images
        function getRandomImages() {
            currentQuery = 'random';
            clearGallery();
            fetchImages('random', 1);
        }

        // Load more images
        function loadMoreImages() {
            currentPage++;
            fetchImages(currentQuery, currentPage);
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchImages();
            }
        });

        // Load initial images on page load
        window.addEventListener('load', () => {
            fetchImages(currentQuery, 1);
        });
    </script>
</body>
</html>
